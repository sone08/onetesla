# render.yaml — Deploy OneTesla to Render.com
# Uses Docker so we can run both tesla-http-proxy (Go) and Node.js in one service

services:
  - type: web
    name: onetesla
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Set these in Render dashboard ────────────────────────────────────
      - key: TESLA_CLIENT_ID
        sync: false
      - key: TESLA_CLIENT_SECRET
        sync: false
      - key: TESLA_REDIRECT_URI
        value: https://onetesla.onrender.com/api/tesla/callback
      - key: TESLA_AUTH_URL
        value: https://auth.tesla.com/oauth2/v3
      - key: TESLA_AUDIENCE
        value: https://fleet-api.prd.na.vn.cloud.tesla.com
      - key: NGROK_URL
        value: https://onetesla.onrender.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # ── Persistent auth (copy from /api/tesla/token-info after login) ────
      - key: TESLA_REFRESH_TOKEN
        sync: false
      # ── Render API — auto-persist rotated refresh tokens ─────────────────
      # Get API key: dashboard.render.com → Account Settings → API Keys
      # Get service ID: your service URL slug, e.g. srv-xxxxxxxx
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
      # ── Private key for signed commands (paste contents of private-key.pem)
      - key: TESLA_PRIVATE_KEY
        sync: false
