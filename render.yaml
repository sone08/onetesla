# render.yaml — Deploy OneTesla to Render.com
# Uses Docker so we can run both tesla-http-proxy (Go) and Node.js in one service

services:
  - type: web
    name: onetesla
    runtime: node
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: npm ci --include=dev && npm run build && cd backend && npm ci --omit=dev
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Set these in Render dashboard ────────────────────────────────────
      # ── Tesla OAuth ──────────────────────────────────────────────────────
      - key: TESLA_CLIENT_ID
        sync: false
      - key: TESLA_CLIENT_SECRET
        sync: false
      - key: TESLA_REDIRECT_URI
        value: https://onetesla.onrender.com/api/tesla/callback
      - key: TESLA_AUTH_URL
        value: https://auth.tesla.com/oauth2/v3
      - key: TESLA_AUDIENCE
        value: https://fleet-api.prd.na.vn.cloud.tesla.com
      - key: NGROK_URL
        value: https://onetesla.onrender.com
      # ── App Security ─────────────────────────────────────────────────────
      - key: APP_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      # ── Push Notifications (VAPID) ────────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # ── Persistent Tesla Auth (set after first login) ────────────────────
      - key: TESLA_REFRESH_TOKEN
        sync: false
      - key: TESLA_ACCESS_TOKEN
        sync: false
      # ── Fleet API Command Signing ─────────────────────────────────────────
      - key: TESLA_PUBLIC_KEY
        sync: false
      - key: TESLA_PRIVATE_KEY
        sync: false
      # ── Render API — auto-persist rotated refresh tokens ─────────────────
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_ID
        sync: false
